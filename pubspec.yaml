dependencies:
  freezed_annotation: ^3.0.0
  json_annotation: ^4.11.0
  vector_math: ^2.2.0

dev_dependencies:
  build_runner: ^2.13.1
  freezed: ^3.2.0
  json_serializable: ^6.13.1
  test: ^1.30.0
